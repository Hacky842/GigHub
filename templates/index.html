<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GigHub - Find Talent. Get Work Done.</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', -apple-system, sans-serif; }

        body {
            background-color: #030f26;
            background-image: radial-gradient(circle at 50% 0%, #082859 0%, #030f26 70%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 0 16px;
            overflow-x: hidden;
        }

        header {
            width: 100%;
            max-width: 480px;
            padding: 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: inherit;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, #2563eb, #06b6d4);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Cinzel', serif;
            font-weight: 800;
            color: #fff;
            font-size: 24px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .logo-text { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }

        .top-nav { display: flex; align-items: center; gap: 8px; }
        
        .btn-top-outline, .btn-top-filled {
            border-radius: 8px;
            font-weight: 600;
            font-size: 12px;
            cursor: pointer;
            padding: 7px 14px;
        }

        .btn-top-outline { background: transparent; border: 1px solid #334155; color: #fff; }
        .btn-top-filled { background: #2563eb; border: none; color: #fff; }

        .hero-section { text-align: center; margin: 10px 0 20px; width: 100%; max-width: 480px; }
        .hero-title { font-size: 30px; font-weight: 800; line-height: 1.2; margin-bottom: 8px; }
        .hero-title span { color: #3b82f6; }
        .hero-subtitle { color: #94a3b8; font-size: 13px; line-height: 1.4; }

        .auth-card {
            background: #ffffff;
            color: #0f172a;
            width: 100%;
            max-width: 440px;
            border-radius: 20px;
            padding: 22px 18px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .tab-bar { display: flex; border-bottom: 2px solid #f1f5f9; margin-bottom: 18px; }
        .tab-item {
            flex: 1; text-align: center; padding-bottom: 10px;
            font-size: 17px; font-weight: 700; color: #94a3b8; cursor: pointer; position: relative;
        }
        .tab-item.active { color: #0f172a; }
        .tab-item.active::after {
            content: ''; position: absolute; bottom: -2px; left: 20%; width: 60%; height: 3px; background: #2563eb; border-radius: 2px;
        }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 11px; color: #64748b; margin-bottom: 4px; font-weight: 600; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i.icon-left { position: absolute; left: 12px; color: #94a3b8; width: 18px; height: 18px; }
        
        .input-wrapper input, .input-wrapper select {
            width: 100%; padding: 11px 12px 11px 38px; background: #f8fafc;
            border: 1px solid #e2e8f0; border-radius: 10px; font-size: 13px; color: #0f172a; outline: none;
        }

        .btn-otp {
            position: absolute; right: 6px; background: #2563eb; color: #fff;
            border: none; padding: 6px 10px; border-radius: 6px; font-size: 11px; font-weight: 700; cursor: pointer;
        }

        .btn-submit {
            width: 100%; padding: 12px; background: #2563eb; color: #fff;
            border: none; border-radius: 10px; font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 6px;
        }

        .panel-content { display: none; }
        .panel-content.active { display: block; }

        /* Full Legal Modal */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.88); backdrop-filter: blur(6px);
            display: none; justify-content: center; align-items: center; z-index: 1000; padding: 16px;
        }
        .modal-card {
            background: #ffffff; color: #0f172a; border-radius: 16px; padding: 20px;
            max-width: 460px; width: 100%; position: relative; max-height: 82vh; overflow-y: auto;
        }
        .modal-close { position: absolute; right: 16px; top: 16px; cursor: pointer; color: #64748b; }

        footer { width: 100%; text-align: center; padding-bottom: 20px; }
        .footer-links { display: flex; justify-content: center; gap: 14px; font-size: 12px; color: #94a3b8; margin-bottom: 10px; }
        .footer-links a { color: #94a3b8; text-decoration: underline; cursor: pointer; }

        .btn-telegram {
            background: #ffffff; color: #0f172a; border: 1px solid #cbd5e1;
            padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600;
            display: inline-flex; align-items: center; gap: 6px; text-decoration: none; margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <header>
        <a href="/" target="_blank" class="logo-container">
            <div class="logo-icon">G</div>
            <span class="logo-text">GigHub</span>
        </a>
        <div class="top-nav">
            <button class="btn-top-outline" onclick="switchTab('login')">Login</button>
            <button class="btn-top-filled" onclick="switchTab('signup')">Sign Up</button>
        </div>
    </header>

    <div class="hero-section">
        <h1 class="hero-title">Find Talent.<br><span>Get Work Done.</span></h1>
        <p class="hero-subtitle">Direct Freelancer & Client Marketplace Platform</p>
    </div>

    <div class="auth-card">
        <div class="tab-bar">
            <div class="tab-item active" id="loginTab" onclick="switchTab('login')">Login</div>
            <div class="tab-item" id="signupTab" onclick="switchTab('signup')">Sign Up</div>
        </div>

        <!-- LOGIN -->
        <div id="loginPanel" class="panel-content active">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="icon-left"></i>
                        <input type="email" id="login_email" placeholder="Email Address" required>
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <i data-lucide="lock" class="icon-left"></i>
                        <input type="password" id="login_pass" placeholder="Password" required>
                    </div>
                </div>
                <button type="submit" class="btn-submit">Login Now</button>
            </form>
        </div>

        <!-- SIGNUP -->
        <div id="signupPanel" class="panel-content">
            <form onsubmit="handleSignup(event)">
                <div class="form-group">
                    <div class="input-wrapper">
                        <i data-lucide="user" class="icon-left"></i>
                        <input type="text" id="signup_name" placeholder="Full Name" required>
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <i data-lucide="mail" class="icon-left"></i>
                        <input type="email" id="signup_email" placeholder="Email Address" required>
                        <button type="button" class="btn-otp" onclick="requestOTP()">Send OTP</button>
                    </div>
                </div>
                <div class="form-group" id="otpGroup" style="display:none;">
                    <div class="input-wrapper">
                        <i data-lucide="shield-check" class="icon-left"></i>
                        <input type="text" id="signup_otp" placeholder="Enter OTP Code">
                    </div>
                </div>
                <div class="form-group">
                    <div class="input-wrapper">
                        <i data-lucide="lock" class="icon-left"></i>
                        <input type="password" id="signup_pass" placeholder="Password" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Joining As</label>
                    <div class="input-wrapper">
                        <i data-lucide="briefcase" class="icon-left"></i>
                        <select id="signup_role" onchange="toggleSkills()">
                            <option value="Freelancer">Freelancer looking for work</option>
                            <option value="Client">Client looking to hire</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" id="skillsGroup">
                    <div class="input-wrapper">
                        <i data-lucide="wrench" class="icon-left"></i>
                        <input type="text" id="signup_skills" placeholder="Skills (e.g. Design, Web Dev)">
                    </div>
                </div>
                <button type="submit" class="btn-submit">Create Free Account</button>
            </form>
        </div>
    </div>

    <!-- LEGAL MODAL (TO PREVENT LEGAL ISSUES) -->
    <div class="modal-overlay" id="policyModal">
        <div class="modal-card">
            <i data-lucide="x" class="modal-close" onclick="closeModal()"></i>
            <h3 id="modalTitle" style="margin-bottom:12px; font-weight:800; border-bottom:1px solid #e2e8f0; padding-bottom:8px;"></h3>
            <div id="modalBody" style="font-size:12px; color:#334155; line-height:1.6;"></div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a onclick="openModal('terms')">Terms of Service</a>
            <span>|</span>
            <a onclick="openModal('privacy')">Privacy Policy</a>
        </div>
        <a href="https://t.me/HackyNetworksStudio" target="_blank" class="btn-telegram">
            <i data-lucide="send" style="width: 14px; height: 14px; color: #0284c7;"></i>
            Support on Telegram
        </a>
        <p style="font-size: 11px; color: #64748b;">Powered by <span style="color: #3b82f6; font-weight:700;">HackyNetworksStudio</span></p>
    </footer>

    <script>
        lucide.createIcons();

        function switchTab(tab) {
            document.getElementById('loginTab').classList.toggle('active', tab === 'login');
            document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
            document.getElementById('loginPanel').classList.toggle('active', tab === 'login');
            document.getElementById('signupPanel').classList.toggle('active', tab === 'signup');
        }

        function toggleSkills() {
            const role = document.getElementById('signup_role').value;
            document.getElementById('skillsGroup').style.display = (role === 'Client') ? 'none' : 'block';
        }

        async function requestOTP() {
            const email = document.getElementById('signup_email').value;
            if(!email) return alert('Pehle email enter karein!');
            const res = await fetch('/send-otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ email })
            });
            const data = await res.json();
            alert(data.message);
            document.getElementById('otpGroup').style.display = 'block';
        }

        function openModal(type) {
            const modal = document.getElementById('policyModal');
            const title = document.getElementById('modalTitle');
            const body = document.getElementById('modalBody');

            if(type === 'terms') {
                title.innerText = "Terms of Service & Platform Guidelines";
                body.innerHTML = `
                    <p><b>1. Acceptance of Terms:</b> By accessing GigHub, users agree to operate within the Indian Information Technology Act guidelines.</p><br>
                    <p><b>2. User Responsibilities:</b> Clients and Freelancers are independent contractors. HackyNetworksStudio is not liable for outside platform transactions.</p><br>
                    <p><b>3. Misconduct Policy:</b> Fraud, illegal services, spamming, or fake profiles will result in immediate ban without notice.</p>
                `;
            } else {
                title.innerText = "Privacy & Data Protection Policy";
                body.innerHTML = `
                    <p><b>1. Data Handling:</b> User credentials are stored securely via encrypted Pantry Cloud baskets.</p><br>
                    <p><b>2. Information Sharing:</b> We never sell or expose user personal details to third-party ad platforms.</p><br>
                    <p><b>3. Telegram Contacts:</b> Communication handles provided by users are strictly used for freelance project matching.</p>
                `;
            }
            modal.style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('policyModal').style.display = 'none';
        }

        async function handleSignup(e) {
            e.preventDefault();
            const res = await fetch('/signup', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    name: document.getElementById('signup_name').value,
                    email: document.getElementById('signup_email').value,
                    password: document.getElementById('signup_pass').value,
                    role: document.getElementById('signup_role').value,
                    skills: document.getElementById('signup_skills').value
                })
            });
            const data = await res.json();
            alert(data.message);
            if(data.status === 'success') window.location.href = '/dashboard';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const res = await fetch('/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    email: document.getElementById('login_email').value,
                    password: document.getElementById('login_pass').value
                })
            });
            const data = await res.json();
            alert(data.message);
            if(data.status === 'success') window.location.href = '/dashboard';
        }
    </script>
</body>
</html>
